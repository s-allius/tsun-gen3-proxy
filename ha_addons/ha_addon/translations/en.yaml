---
configuration:
  inverters:
    name: Inverters
    fields:
      serial:
        name: Serial Number
        description: >-
          For each inverter, the serial number must be mapped to an MQTT definition. 
          Enter the 16-digit serial number here to start the configuration block. All 
          subsequent parameters will be assigned to this inverter.
          
          Inverter serial numbers for GEN3 start with 'R17' or 'R47', and for GEN3PLUS 
          with 'Y00', 'Y17', or 'Y47'.
          
          See the example configuration in the documentation tab.
      monitor_sn:
        name: Monitoring Serial Number (GEN3PLUS)
        description: >-
          GEN3PLUS inverters have a monitoring serial number required for registration 
          with the Solarman or TSUN cloud. You can find this number on the included sticker. 
          Enter the serial number here if you want the proxy to forward your data to the cloud.
      node_id:
        name: Node ID
        description: >-
          The Node ID uniquely assigns data to each device and is part of the MQTT 
          topics. Please ensure that every device (inverters as well as batteries) 
          has a unique Node ID. Otherwise, measurement data from different devices 
          will overwrite each other.
      suggested_area:
        name: Default Area (Room)
        description: >-
          Specify the default area (e.g., "Solar", "Garage", or "Basement") where this 
          device should be automatically assigned upon initial discovery in Home Assistant.
      modbus_polling:
        name: ModBus Polling
        description: >-
          By default, the devices transmit their readings every 5 minutes. Enabling the 
          ModBus polling option allows the proxy to additionally poll the data every 
          minute, updating it in both the MQTT broker and Home Assistant.
      client_mode.host:
        name: Client Mode - Device IP
        description: >-
          Some devices support incoming connections to provide data via ModBus TCP 
          within the LAN. Enabling Client Mode allows the proxy to establish this 
          connection. For stable operation, the device must be assigned a static 
          IP address. Enter the static device IP here.
      client_mode.port:
        name: Client Mode - Device Port Number
        description: >-
          Specify the network port used for the ModBus TCP connection. The default port is 8899.
      client_mode.forward:
        name: Client Mode - Forwarding
        description: >-
          When Client Mode is active, the proxy can forward the retrieved data to the 
          TSUN/Solarman Cloud. The proxy then emulates a device for the cloud. Enable 
          this option if you want to use the forwarding feature.  batteries:
      pv1.manufacturer:
        name: PV-1 Manufacturer          
      pv1.type:
        name: PV-1 Type
      pv2.manufacturer:
        name: PV-2 Manufacturer          
      pv2.type:
        name: PV-2 Type
  batteries:
    name: Batteries
    fields:
      serial:
        name: Serial Number
        description: >+
          For each energy storage system, the storage serial number must be mapped to an MQTT definition. 
          Enter the 16-digit serial number here to start the configuration block. All 
          subsequent parameters will be assigned to this storage device.
          
          Energy storage serial numbers for GEN3PLUS systems start with '410' or 'Y00'.
          
          See the example configuration in the documentation tab.
      monitor_sn:
        name: Monitoring Serial Number
        description: >-
          TSUN enerfy storage systems have a monitoring serial number required for registration 
          with the Solarman or TSUN cloud. You can find this number on the included sticker. 
          Enter the serial number here if you want the proxy to forward your data to the cloud.
      node_id:
        name: Node ID
        description: >-
          The Node ID uniquely assigns data to each device and is part of the MQTT 
          topics. Please ensure that every device (inverters as well as batteries) 
          has a unique Node ID. Otherwise, measurement data from different devices 
          will overwrite each other.
      suggested_area:
        name: Default Area (Room)
        description: >-
          Specify the default area (e.g., "Solar", "Garage", or "Basement") where this 
          device should be automatically assigned upon initial discovery in Home Assistant.
      modbus_polling:
        name: ModBus Polling
        description: >-
          By default, the devices transmit their readings every 5 minutes. Enabling the 
          ModBus polling option allows the proxy to additionally poll the data every 
          minute, updating it in both the MQTT broker and Home Assistant.
      client_mode.host:
        name: Client Mode - Device IP
        description: >-
          Some devices support incoming connections to provide data via ModBus TCP 
          within the LAN. Enabling Client Mode allows the proxy to establish this 
          connection. For stable operation, the device must be assigned a static 
          IP address. Enter the static device IP here.
      client_mode.port:
        name: Client Mode - Device Port Number
        description: >-
          Specify the network port used for the ModBus TCP connection. The default port is 8899.
      client_mode.forward:
        name: Client Mode - Forwarding
        description: >-
          When Client Mode is active, the proxy can forward the retrieved data to the 
          TSUN/Solarman Cloud. The proxy then emulates a device for the cloud. Enable 
          this option if you want to use the forwarding feature.
      pv1.manufacturer:
        name: PV-1 Manufacturer          
      pv1.type:
        name: PV-1 Type
      pv2.manufacturer:
        name: PV-2 Manufacturer          
      pv2.type:
        name: PV-2 Type

  tsun.enabled:
    name: Connection to TSUN Cloud - for GEN3 inverter only
    description: >+
      Switch on/off connection to the TSUN cloud.
      This connection is only required if you want send data to the TSUN cloud
      eg. to use the TSUN APPs or receive firmware updates.
      
      On => normal proxy operation.
      Off => The Inverter become isolated from Internet.
  tsun.listener:
    name: Connecting TSUN GEN3 Inverters
    description: >+
      Opens/closes port 5005 for unencrypted connections from TSUN GEN3 devices.
      If you do not have any GEN3 devices, the port can be closed.
      
      On => accepts incoming connections.
      Off => blocks incoming connections.
  solarman.enabled:
    name: Connection to Solarman/TSUN Cloud - for GEN3PLUS inverter only
    description: >+
      Switch on/off connection to the Solarman or TSUN cloud.
      This connection is only required if you want send data to the cloud
      eg. to use the Solarman APP, the TSUN Smart APP or receive firmware updates.
      
      On => normal proxy operation.
      Off => The GEN3PLUS devices become isolated from Internet
  solarman.listener:
    name: Connecting TSUN GEN3PLUS Devices
    description: >+
      Opens/closes port 10000 for unencrypted connections from TSUN GEN3PLUS devices.
      New firmware versions of TSUN establish encrypted connections via a different port.
      In this case, you can use client mode and the port can remain closed.
      
      On => accepts incoming connections.
      Off => blocks incoming connections.
  inverters.allow_all:
    name: Allow all connections from all inverters
    description: >-
      The proxy only usually accepts connections from configured inverters.
      Switch on for test purposes and unknown serial numbers.

  mqtt:
    name: MQTT Broker
    description: >-
      Home Assistant includes an MQTT Mosquitto integration. If this is used, the 
      proxy is configured automatically and NO MQTT credentials must be entered here. 
      We recommend this operating mode for the proxy.

      If an external MQTT broker is to be used, the necessary credentials must 
      be entered here.
    fields:
      host:
        name: MQTT Broker Host
        description: >-
          Hostname or IP address of the MQTT broker.
      port:
        name: MQTT Broker Port
        description: >-
          Port of the MQTT broker.
      user:
        name: MQTT Broker User
        description: >-
          Username for the MQTT broker.
      passwd:
        name: MQTT Broker Password
        description: >-
          Password for the MQTT broker.

  ha:
    name: Home Assistant MQTT Parameters
    description: >-
      If you do not run your MQTT broker with the standard Home Assistant configuration, 
      you can adjust the prefixes here. Please only modify these settings if you know 
      exactly what they do.
    fields:
      auto_conf_prefix:
        name: Auto-Config Prefix
        description: >-
          MQTT prefix for subscribing to Home Assistant status updates.
      discovery_prefix:
        name: Discovery Prefix
        description: >-
          MQTT prefix for the discovery topic.
      entity_prefix:
        name: Entity Prefix
        description: >-
          MQTT topic prefix for publishing inverter readings.
      proxy_node_id:
        name: Proxy Node ID
        description: >-
          MQTT node ID for this proxy instance.
      proxy_unique_id:
        name: Proxy Unique ID
        description: >-
          Unique MQTT ID used to identify a specific proxy instance.

  tsun.host:
    name: TSUN Cloud Host
    description: >-
      Hostname or IP address of the TSUN cloud. if not set, the app will try to connect to the cloud 
      on logger.talent-monitoring.com
  solarman.host:
    name: Solarman Cloud Host
    description: >-
      Hostname or IP address of the Solarman cloud. if not set, the app will try to connect to the cloud 
      on iot.talent-monitoring.com
  gen3plus.at_acl.tsun.allow:
      name: TSUN GEN3PLUS ACL allow
      description: >-
        List of allowed TSUN GEN3PLUS AT commands
  gen3plus.at_acl.tsun.block:
      name: TSUN GEN3PLUS ACL block
      description: >-
          List of blocked TSUN GEN3PLUS AT commands
  gen3plus.at_acl.mqtt.allow:
      name: MQTT GEN3PLUS ACL allow
      description: >-
        List of allowed MQTT GEN3PLUS commands
  gen3plus.at_acl.mqtt.block:
      name: MQTT GEN3PLUS ACL block
      description: >-
          List of blocked MQTT GEN3PLUS commands
  logging:
    name: Logging & Storage
    description: >-
      The proxy records operational events in log files to help identify and resolve configuration 
      or compatibility issues. Every day at midnight, an automatic rollover occurs: existing files 
      are renamed with the current date, and new files are created as entries come in. 
      
      Since these files can consume significant disk space, you can configure the retention period 
      and the maximum log level here.
    fields:
      level:
        name: Log level
        description: >-
          DEBUG: Complete logging  -  
          INFO(default): Information, warnings, and error messages  -  
          WARN: Warnings and error messages only  -  
          ERROR: Error messages only
      retention_days:
        name: Retention Period
        description: >+
          Retention period for log files in days

network:
  5005/tcp: listening Port for TSUN GEN3 Devices
  10000/tcp: listening Port for TSUN GEN3PLUS Devices
  8127/tcp: Port for the TSUN-Proxy Dashboard
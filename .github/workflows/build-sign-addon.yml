name: Build & Sign Home Assistant Add-on

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-rc*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE: ghcr.io/s-allius/tsun-gen3-proxy

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout proxy
        uses: actions/checkout@v4
        with:
          path: './tsun-gen3-proxy'
          fetch-depth: 1

      - name: Checkout home assistant repro
        uses: actions/checkout@v4
        with:
          path: './ha-addons'
          repository: s-allius/ha-addons
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: 'tsun-gen3-proxy/app/requirements-build.txt'

      - name: Install dependencies
        run: |
          cd tsun-gen3-proxy
          python -m pip install --upgrade pip
          pip install -r app/requirements-build.txt

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect version and build mode
        id: buildtype
        run: |
          REF="${GITHUB_REF_NAME}"
          VERSION="${REF#v}"
          # Use gha cache with max mode to cache all stages (including wheels)
          BAKE_OPTS="--set *.cache-from=type=gha,scope=tsun-proxy --set *.cache-to=type=gha,mode=max,scope=tsun-proxy"

          if [[ "$REF" =~ -rc([0-9]+)$ ]]; then
            RC_NUM="${BASH_REMATCH[1]}"
            echo "make_cmd=make VERSION=${VERSION%-*} BUILD_ARGS='${BAKE_OPTS}' RC=${RC_NUM} addon-rc rc" >> $GITHUB_OUTPUT
            echo "build_type=rc" >> $GITHUB_OUTPUT
          else
            echo "make_cmd=make VERSION=${VERSION%-*} BUILD_ARGS='${BAKE_OPTS}' addon-rel rel" >> $GITHUB_OUTPUT
            echo "build_type=rel" >> $GITHUB_OUTPUT
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          
      - name: Build and push images
        env:
          PUBLIC_CONTAINER_REGISTRY: ghcr.io/${{ github.actor }}/
          NO_LOGIN: 1
        run: |
          cd tsun-gen3-proxy
          # Run shared dependency first
          make babel
          # Execute container builds in parallel
          ${{ steps.buildtype.outputs.make_cmd }} -j2

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container images
        run: |
          IMAGES=(
            "ghcr.io/s-allius/tsun-gen3-addon"
            "ghcr.io/s-allius/tsun-gen3-proxy"
          )
          VERSION="${{ steps.buildtype.outputs.version }}"
          sleep 2
          for IMAGE in "${IMAGES[@]}"; do
            (
              DIGEST=$(docker buildx imagetools inspect ${IMAGE}:${VERSION} --format '{{.Manifest.Digest}}')
              cosign sign --yes \
                -a repo=https://github/${{ github.repository }} \
                -a ref=${GITHUB_REF_NAME} \
                ${IMAGE}@${DIGEST}
            ) &
          done
          wait

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.HA_REPRO_PULLREQUESTS }}
          commit-message: "Update for release ${{ github.ref_name }}"
          title: "🚀 Automated Update: ${{ github.ref_name }}"  
          branch: "update/${{ github.ref_name }}"
          body: |
            ## 🤖 Automated Update
            This PR was generated from ${{ github.repository }} @ ${{ github.sha }}.
          path: './ha-addons'

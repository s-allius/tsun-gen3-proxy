name: Build & Sign Home Assistant Add-on
on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-rc*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE: ghcr.io/s-allius/tsun-gen3-proxy

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # The ha_addons repo must be checked out before the tsun-gen3-proxy repo. Otherwise,
      # updated files will not be copied into the ha_addons repo because the destination
      # file is newer.
      - name: Checkout home assistant repo
        uses: actions/checkout@v6
        with:
          path: './ha-addons'
          repository: s-allius/ha-addons
          fetch-depth: 1

      - name: Checkout proxy
        uses: actions/checkout@v6
        with:
          path: './tsun-gen3-proxy'
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: 'pip'
          cache-dependency-path: 'tsun-gen3-proxy/app/requirements-build.txt'

      - name: Install dependencies
        run: |
          cd tsun-gen3-proxy
          python -m pip install --upgrade pip
          pip install -r app/requirements-build.txt

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect version and build mode
        id: buildtype
        run: |
          REF="${GITHUB_REF_NAME}"
          VERSION="${REF#v}"
          # Use gha cache with max mode to cache all stages (including wheels)
          BAKE_OPTS="--set *.cache-from=type=gha,scope=tsun-proxy --set *.cache-to=type=gha,mode=max,scope=tsun-proxy"

          if [[ "$REF" =~ -rc([0-9]+)$ ]]; then
            RC_NUM="${BASH_REMATCH[1]}"
            echo "make_cmd=make VERSION=${VERSION%-*} BUILD_ARGS='${BAKE_OPTS}' RC=${RC_NUM} addon-rc rc" >> $GITHUB_OUTPUT
            echo "extension=rc" >> $GITHUB_OUTPUT
          else
            echo "make_cmd=make VERSION=${VERSION%-*} BUILD_ARGS='${BAKE_OPTS}' addon-rel rel" >> $GITHUB_OUTPUT
            echo "extension=rel" >> $GITHUB_OUTPUT
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          
      - name: Build and push images
        env:
          PUBLIC_CONTAINER_REGISTRY: ghcr.io/${{ github.actor }}/
          NO_LOGIN: 1
        run: |
          cd tsun-gen3-proxy
          # Run shared dependency first
          make babel
          # Execute container builds in parallel
          ${{ steps.buildtype.outputs.make_cmd }} -j2

      - name: Sign container images
        run: |
          IMAGES=(
            "ghcr.io/s-allius/tsun-gen3-addon"
            "ghcr.io/s-allius/tsun-gen3-proxy"
          )
          VERSION="${{ steps.buildtype.outputs.version }}"
          sleep 2
          for IMAGE in "${IMAGES[@]}"; do
            (
              DIGEST=$(docker buildx imagetools inspect ${IMAGE}:${VERSION} --format '{{.Manifest.Digest}}')
              cosign sign --yes \
                -a repo=https://github/${{ github.repository }} \
                -a ref=${GITHUB_REF_NAME} \
                ${IMAGE}@${DIGEST}
            ) &
          done
          wait
      - name: Show git status
        run: |
          cd ha-addons
          echo "File status:"
          git status
          echo "Detailed diff:"
          git diff
      - name: Extract Diff from Changelog
        id: changelog_diff
        working-directory: ./ha-addons
        run: |
          # Use the suffix from your previous step (adjust 'previous_step_id' accordingly)
          SUFFIX="${{ steps.buildtype.outputs.extension }}"
          TARGET_DIR="ha_addon_${SUFFIX}"
          FILE_PATH="${TARGET_DIR}/CHANGELOG.md"

          echo "Processing changelog in: $FILE_PATH"

          # Fetch remote state to allow comparison
          git fetch origin main --depth=1

          # Extract new lines:
          # 1. Compare local file with origin/main version
          # 2. Grep filters lines starting with '+' (ignoring the '+++' header)
          # 3. Sed removes the leading '+' for clean Markdown
          DIFF_CONTENT=$(git diff origin/main -- "$FILE_PATH" | grep '^+[^+]' | sed 's/^+//')

          # Secure multi-line output for GitHub Actions
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.HA_REPRO_PULLREQUESTS }}
          commit-message: "Update to version: ${{ github.ref_name }}"
          title: "🚀 Automated Update: ${{ github.ref_name }}"  
          branch: "update/${{ github.ref_name }}"
          body: |
            ## 🤖 Automated Update
            This pull request was automatically generated by the workflow in the source repository `${{ github.repository }}`.

            ### ℹ️ Details
            - **Triggered by:** `${{ github.event_name }}`
            - **Reference (Tag/Branch):** `${{ github.ref_name }}`
            - **Source Commit:** `${{ github.sha }}`

            <details>
            <summary><b>View Changelog Details (Click to expand)</b></summary>

            ### 📝 Change Log Summary
            ${{ steps.changelog_diff.outputs.changes }}

            </details>

            ### 🔗 Links
            - [View Release/Tag](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})
            - [Source Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ---
            *This PR was generated automatically.*
          path: './ha-addons'

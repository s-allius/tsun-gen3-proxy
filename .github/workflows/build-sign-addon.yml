name: Build & Sign Home Assistant Add-on

on:
  push:
    tags:
      - "v*.*.*"        # Release (z. B. v1.2.3)
      - "v*.*.*-rc*"    # Release Candidate (z. B. v1.2.3-rc1)
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write   # notwendig für cosign keyless

env:
  IMAGE: ghcr.io/s-allius/tsun-gen3-proxy

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout proxy
        uses: actions/checkout@v6
        with:
          path: './tsun-gen3-proxy'
          fetch-depth: 1

      - name: Checkout home assistant repro
        uses: actions/checkout@v6
        with:
          path: './ha-addons'
          repository: s-allius/ha-addons
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.4"
          cache: 'pip'
          cache-dependency-path: 'tsun-gen3-proxy/app/requirements-build.txt'

      - name: Install dependencies
        run: |
          cd tsun-gen3-proxy
          python -m pip install --upgrade pip
          pip install -r app/requirements-build.txt

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------
      # Release vs RC Entscheidung
      # ------------------------------------------------------------
      - name: Detect version and build mode
        id: buildtype
        run: |
          REF="${GITHUB_REF_NAME}"
          VERSION="${REF#v}"
          DOCKER_BUILD_ARGS: "--cache-from type=gha --cache-to type=gha,mode=max"

          if [[ "$REF" =~ -rc([0-9]+)$ ]]; then
            RC_NUM="${BASH_REMATCH[1]}"
            echo "make_cmd=make VERSION=${VERSION%-*} BUILD_ARGS="${DOCKER_BUILD_ARGS}" RC=${RC_NUM} addon-rc rc" >> $GITHUB_OUTPUT
            echo "build_type=rc" >> $GITHUB_OUTPUT
            echo "rc_number=${RC_NUM}" >> $GITHUB_OUTPUT
          else
            echo "make_cmd=make VERSION=${VERSION%-*} BUILD_ARGS="${DOCKER_BUILD_ARGS}" addon-rel rel" >> $GITHUB_OUTPUT
            echo "build_type=rel" >> $GITHUB_OUTPUT
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          
      # ------------------------------------------------------------
      # Build & Push (nutzt dein bestehendes Makefile!)
      # ------------------------------------------------------------
      - name: Build and push add-on image
        env:
          PUBLIC_CONTAINER_REGISTRY: ghcr.io/${{ github.actor }}/
          NO_LOGIN: 1
        run: |
          echo "Build type: ${{ steps.buildtype.outputs.build_type }}"
          echo "Command:   ${{ steps.buildtype.outputs.make_cmd }}"
          echo "Registry=${PUBLIC_CONTAINER_REGISTRY}"
          cd tsun-gen3-proxy
          ${{ steps.buildtype.outputs.make_cmd }}

      # ------------------------------------------------------------
      # cosign installieren
      # ------------------------------------------------------------
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # ------------------------------------------------------------
      # Image signieren (Digest-basiert, keyless)
      # ------------------------------------------------------------
      - name: Sign container images
        run: |
          IMAGES=(
            "ghcr.io/s-allius/tsun-gen3-addon"
            "ghcr.io/s-allius/tsun-gen3-proxy"
          )
          VERSION="${{ steps.buildtype.outputs.version }}"

          for IMAGE in "${IMAGES[@]}"; do
            (
              DIGEST=$(docker buildx imagetools inspect ${IMAGE}:${VERSION} \
                --format '{{.Manifest.Digest}}')

              cosign sign --yes\
                -a repo=https://github.com/${{ github.repository }} \
                -a ref=${GITHUB_REF_NAME} \
                ${IMAGE}@${DIGEST}
            ) &  # the '&' runs it as background process
          done
          wait  # until all are fineshed

      - name: Erstelle Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.HA_REPRO_PULLREQUESTS }}
          commit-message: "Update for release ${{ github.ref_name }}"
          title: "🚀 Automated Update: ${{ github.ref_name }}"  
          branch: "update/${{ github.ref_name }}"
          body: |
            ## 🤖 Automated Update
            This pull request was automatically generated by the workflow in the source repository `${{ github.repository }}`.

            ### ℹ️ Details
            - **Triggered by:** `${{ github.event_name }}`
            - **Reference (Tag/Branch):** `${{ github.ref_name }}`
            - **Source Commit:** `${{ github.sha }}`

            ### 🔗 Links
            - [View Release/Tag](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})
            - [Source Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ---
            *This PR was generated automatically.*
          path: './ha-addons'

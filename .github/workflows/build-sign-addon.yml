name: Build & Sign Home Assistant Add-on

on:
  push:
    tags:
      - "v*.*.*"        # Release (z. B. v1.2.3)
      - "v*.*.*-rc*"    # Release Candidate (z. B. v1.2.3-rc1)
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write   # notwendig für cosign keyless

env:
  IMAGE: ghcr.io/s-allius/tsun-gen3-proxy

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.14.4
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.4"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-build.txt ]; then pip install -r requirements-build.txt; fi
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------
      # Release vs RC Entscheidung
      # ------------------------------------------------------------
      - name: Detect version and build mode
        id: buildtype
        run: |
          REF="${GITHUB_REF_NAME}"
          VERSION="${REF#v}"

          if [[ "$REF" =~ -rc([0-9]+)$ ]]; then
            RC_NUM="${BASH_REMATCH[1]}"
            echo "make_cmd=make RC=${RC_NUM} addon-rc" >> $GITHUB_OUTPUT
            echo "build_type=rc" >> $GITHUB_OUTPUT
            echo "rc_number=${RC_NUM}" >> $GITHUB_OUTPUT
          else
            echo "make_cmd=make addon-rel" >> $GITHUB_OUTPUT
            echo "build_type=rel" >> $GITHUB_OUTPUT
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          
      # ------------------------------------------------------------
      # Build & Push (nutzt dein bestehendes Makefile!)
      # ------------------------------------------------------------
      - name: Build and push add-on image
        run: |
          echo "Build type: ${{ steps.buildtype.outputs.build_type }}"
          echo "Command:   ${{ steps.buildtype.outputs.make_cmd }}"
          ${{ steps.buildtype.outputs.make_cmd }}

      # ------------------------------------------------------------
      # cosign installieren
      # ------------------------------------------------------------
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # ------------------------------------------------------------
      # Image signieren (Digest-basiert, keyless)
      # ------------------------------------------------------------
      - name: Sign container images
        run: |
          IMAGE="ghcr.io/s-allius/tsun-gen3-proxy"
          VERSION="${{ steps.buildtype.outputs.version }}"

          DIGEST=$(docker buildx imagetools inspect ${IMAGE}:${VERSION} \
            --format '{{.Manifest.Digest}}')

          echo "Signing ${IMAGE}@${DIGEST}"

          cosign sign \
            -a repo=https://github.com/s-allius/tsun-gen3-proxy \
            -a ref=${GITHUB_REF_NAME} \
            ${IMAGE}@${DIGEST}